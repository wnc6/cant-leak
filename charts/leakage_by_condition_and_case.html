<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leakage by Condition and Case</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
    body {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
        background: #fff;
        color: #333;
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
    .chart-container { position: relative; height: 400px; }
</style>
</head>
<body>
<h1>Average Leakage by Condition Across Clinical Cases</h1>
<p class="subtitle">Grouped by condition, colored by case specialty. Lower is better.</p>

<div class="chart-container">
    <canvas id="caseChart"></canvas>
</div>

<script>
const data = [{"condition": "Naive Prompting", "Cardiology": 3.1, "Respiratory": 3.0, "GI": 6.3}, {"condition": "Structured Prompting", "Cardiology": 4.7, "Respiratory": 3.7, "GI": 7.3}, {"condition": "Self- Monitoring", "Cardiology": 3.5, "Respiratory": 2.5, "GI": 5.2}, {"condition": "Isolated Architecture", "Cardiology": 0.0, "Respiratory": 0.0, "GI": 0.0}, {"condition": "No-Isolation Ablation", "Cardiology": 0.5, "Respiratory": 0.2, "GI": 1.5}, {"condition": "No-Verifier Ablation", "Cardiology": 0.0, "Respiratory": 0.0, "GI": 0.2}];
const cases = ['Cardiology', 'Respiratory', 'GI'];
const caseColors = { 'Cardiology': '#3b82f6', 'Respiratory': '#22c55e', 'GI': '#f97316' };

const datasets = cases.map(c => ({
    label: c,
    data: data.map(d => d[c]),
    backgroundColor: caseColors[c] + '99',
    borderColor: caseColors[c],
    borderWidth: 1,
}));

new Chart(document.getElementById('caseChart'), {
    type: 'bar',
    data: {
        labels: data.map(d => d.condition),
        datasets: datasets,
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: { position: 'top', labels: { font: { size: 11 } } }
        },
        scales: {
            y: {
                beginAtZero: true,
                title: { display: true, text: 'Average Leaks per Conversation', font: { size: 12 } }
            }
        }
    }
});
</script>
</body>
</html>
