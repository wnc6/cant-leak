<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Leakage by Strategy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
    body {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        max-width: 960px;
        margin: 40px auto;
        padding: 0 20px;
        background: #fff;
        color: #333;
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
    .chart-container { position: relative; height: 420px; margin-bottom: 40px; }
</style>
</head><body>
<h1>Leakage Rate by Pressure Strategy Across Conditions</h1>
<p class="subtitle">Average leaked withheld facts per 20-turn conversation. Lower is better. N=108 experiments (3 cases × 6 strategies × 6 conditions).</p>
<div class="chart-container"><canvas id="chart"></canvas></div>
<script>
const data = [{"strategy": "Direct", "Naive": 3.8, "Structured": 4.0, "Self-Monitor": 1.3, "Isolated (ours)": 0.0, "No-Isolation": 1.0, "No-Verifier": 0.0}, {"strategy": "Rephrase", "Naive": 3.0, "Structured": 4.0, "Self-Monitor": 3.7, "Isolated (ours)": 0.0, "No-Isolation": 0.3, "No-Verifier": 0.0}, {"strategy": "Emotional", "Naive": 3.0, "Structured": 6.0, "Self-Monitor": 3.3, "Isolated (ours)": 0.0, "No-Isolation": 1.0, "No-Verifier": 0.0}, {"strategy": "Authority", "Naive": 5.3, "Structured": 6.3, "Self-Monitor": 4.0, "Isolated (ours)": 0.0, "No-Isolation": 0.7, "No-Verifier": 0.0}, {"strategy": "Gradual", "Naive": 5.0, "Structured": 5.7, "Self-Monitor": 4.7, "Isolated (ours)": 0.0, "No-Isolation": 1.3, "No-Verifier": 0.3}, {"strategy": "Logical", "Naive": 4.7, "Structured": 5.3, "Self-Monitor": 5.3, "Isolated (ours)": 0.0, "No-Isolation": 0.0, "No-Verifier": 0.0}];
const conds = ["Naive", "Structured", "Self-Monitor", "Isolated (ours)", "No-Isolation", "No-Verifier"];
const colors = {"Naive": "#ef4444", "Structured": "#f97316", "Self-Monitor": "#eab308", "Isolated (ours)": "#22c55e", "No-Isolation": "#3b82f6", "No-Verifier": "#8b5cf6"};
const datasets = conds.map(c => ({
    label: c, data: data.map(d => d[c]),
    backgroundColor: colors[c] + '99', borderColor: colors[c], borderWidth: 1,
}));
new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels: data.map(d => d.strategy), datasets },
    options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { font: { size: 11 } } } },
        scales: {
            y: { beginAtZero: true, title: { display: true, text: 'Avg Leaks', font: { size: 12 } } },
            x: { title: { display: true, text: 'Pressure Strategy', font: { size: 12 } } }
        }
    }
});
</script></body></html>
