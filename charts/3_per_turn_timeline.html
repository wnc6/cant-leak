<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Per-Turn Leakage Timeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
    body {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        max-width: 960px;
        margin: 40px auto;
        padding: 0 20px;
        background: #fff;
        color: #333;
    }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 24px; }
    .chart-container { position: relative; height: 420px; margin-bottom: 40px; }
</style>
</head><body>
<h1>Cumulative Leakage Over Conversation Turns</h1>
<p class="subtitle">Shows when baselines start leaking under sustained pressure. Flat line = no leakage. Rising line = accumulating leaks.</p>
<div class="chart-container"><canvas id="chart"></canvas></div>
<script>
const datasets = [{"label": "Naive", "data": [0.0, 0.05, 0.16, 0.26, 0.47, 0.63, 0.89, 1.16, 1.47, 2.0, 2.26, 2.63, 2.84, 3.21, 3.63, 3.95, 4.16, 4.32, 4.58, 4.79], "borderColor": "#ef4444", "backgroundColor": "#ef444422", "fill": false, "tension": 0.3, "borderWidth": 2}, {"label": "Structured", "data": [0.0, 0.0, 0.11, 0.22, 0.5, 1.06, 1.56, 1.83, 2.11, 2.83, 3.39, 3.72, 4.0, 4.39, 4.83, 5.22, 5.56, 5.83, 6.17, 6.44], "borderColor": "#f97316", "backgroundColor": "#f9731622", "fill": false, "tension": 0.3, "borderWidth": 2}, {"label": "Self-Monitor", "data": [0.0, 0.0, 0.11, 0.39, 0.61, 0.89, 1.22, 1.28, 1.56, 1.94, 2.17, 2.39, 2.44, 2.61, 2.94, 3.28, 3.44, 3.67, 3.89, 4.11], "borderColor": "#eab308", "backgroundColor": "#eab30822", "fill": false, "tension": 0.3, "borderWidth": 2}, {"label": "Isolated (ours)", "data": [0.0, 0.0, 0.11, 0.44, 0.83, 1.11, 1.44, 1.67, 1.89, 2.5, 2.78, 2.94, 3.28, 3.44, 3.83, 4.11, 4.33, 4.5, 4.67, 5.06], "borderColor": "#22c55e", "backgroundColor": "#22c55e22", "fill": false, "tension": 0.3, "borderWidth": 2}, {"label": "No-Isolation", "data": [0.0, 0.0, 0.22, 0.67, 1.0, 1.33, 1.78, 2.11, 2.67, 3.39, 3.78, 3.89, 4.06, 4.5, 5.06, 5.33, 5.5, 5.78, 6.28, 6.44], "borderColor": "#3b82f6", "backgroundColor": "#3b82f622", "fill": false, "tension": 0.3, "borderWidth": 2}, {"label": "No-Verifier", "data": [0.0, 0.06, 0.22, 0.5, 0.78, 1.0, 1.39, 1.5, 1.61, 2.17, 2.44, 2.67, 3.0, 3.28, 3.61, 4.0, 4.22, 4.39, 4.56, 4.94], "borderColor": "#8b5cf6", "backgroundColor": "#8b5cf622", "fill": false, "tension": 0.3, "borderWidth": 2}];
new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
        labels: Array.from({length: 20}, (_, i) => i + 1),
        datasets: datasets,
    },
    options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { font: { size: 11 } } } },
        scales: {
            y: { beginAtZero: true, title: { display: true, text: 'Cumulative Leaks (avg per experiment)', font: { size: 12 } } },
            x: { title: { display: true, text: 'Turn Number', font: { size: 12 } } }
        }
    }
});
</script></body></html>
